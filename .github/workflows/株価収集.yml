name: キオクシア株価収集

on:
  schedule:
    - cron: '5 9 * * 1-5'    # 18:05 JST (UTC+9) 平日
    - cron: '35 11 * * 1-5'  # 20:35 JST 再実行(取りこぼし保険)
  workflow_dispatch:

concurrency:
  group: kioxia-collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 株価データ収集スクリプトを実行
        shell: powershell
        run: |
          & ".\キオクシア株価収集.ps1"
          exit $LASTEXITCODE

      - name: 変更をコミットしてプッシュ
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if (git status --porcelain) {
            git commit -m ("株価データ自動収集 " + (Get-Date).ToUniversalTime().AddHours(9).ToString("yyyy-MM-dd HH:mm") + " JST")
            git push
          } else {
            Write-Host "新規データなし(コミットをスキップ)"
          }
