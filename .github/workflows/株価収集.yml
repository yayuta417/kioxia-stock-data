name: キオクシア株価収集

on:
  schedule:
    - cron: '5 9 * * 1-5'    # 18:05 JST (UTC+9) 平日
    - cron: '35 11 * * 1-5'  # 20:35 JST 再実行(取りこぼし保険)
  workflow_dispatch:

concurrency:
  group: kioxia-collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # 注意: このrunブロックにはASCII以外を書かないこと。
      # ActionsはステップをBOMなし一時ファイルに書き出すため、
      # Windows PowerShell 5.1 が日本語リテラルを文字化けさせる。
      # スクリプト名(日本語)は実行時にフォルダから検出して解決する。
      - name: 株価データ収集スクリプトを実行
        shell: powershell
        run: |
          $script = Get-ChildItem -Path . -Filter *.ps1 | Select-Object -First 1
          if (-not $script) { Write-Error "collector script not found"; exit 1 }
          & $script.FullName
          exit $LASTEXITCODE

      - name: 変更をコミットしてプッシュ
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if (git status --porcelain) {
            git commit -m ("株価データ自動収集 " + (Get-Date).ToUniversalTime().AddHours(9).ToString("yyyy-MM-dd HH:mm") + " JST")
            # PTSポーラーが同時刻にプッシュしている場合に備え、rebase+リトライで競合を回避する
            $ok = $false
            for ($i = 0; $i -lt 3; $i++) {
              git pull --rebase origin main
              git push origin main
              if ($LASTEXITCODE -eq 0) { $ok = $true; break }
              Start-Sleep -Seconds (10 + 15 * $i)
            }
            if (-not $ok) { exit 1 }
          } else {
            Write-Host "新規データなし(コミットをスキップ)"
          }
